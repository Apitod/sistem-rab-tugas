<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Informasi RAB Jurusan</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a5f',
                        secondary: '#2563eb',
                        success: '#16a34a',
                        warning: '#d97706',
                        danger: '#dc2626',
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary min-h-screen flex items-center justify-center p-4">
    <!-- Card Container -->
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-8">
        
        <!-- Header & Logo -->
        <div class="flex flex-col items-center mb-8">
            <!-- Akademik SVG Logo -->
            <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center text-primary mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="2 2 20 20" stroke="currentColor" stroke-width="2">
                    <path d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 text-center">SI-RAB JURUSAN</h1>
            <p class="text-sm text-gray-500 mt-1 text-center font-medium">UIN Sunan Gunung Djati Bandung</p>
        </div>

        <!-- Form Login -->
        <form action="#" method="POST" onsubmit="event.preventDefault(); window.location.href='dashboard-pengusul.html';">
            <!-- Email Input -->
            <div class="mb-5">
                <label for="email" class="block text-sm font-semibold text-gray-600 mb-1.5">Alamat Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full border border-gray-300 rounded-md py-2.5 px-3.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-secondary focus:ring-3 focus:ring-blue-100 transition duration-150"
                       placeholder="nama@uinsgd.ac.id">
            </div>

            <!-- Password Input -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="block text-sm font-semibold text-gray-600">Kata Sandi</label>
                    <a href="#" class="text-xs font-semibold text-secondary hover:underline">Lupa password?</a>
                </div>
                <input type="password" id="password" name="password" required
                       class="w-full border border-gray-300 rounded-md py-2.5 px-3.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-secondary focus:ring-3 focus:ring-blue-100 transition duration-150"
                       placeholder="••••••••">
            </div>

            <!-- Remember Me & Term -->
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center">
                    <input type="checkbox" class="h-4 w-4 text-secondary border-gray-300 rounded focus:ring-secondary">
                    <span class="ml-2 text-sm text-gray-600">Ingat saya</span>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full bg-primary hover:bg-[#162d4a] text-white font-semibold py-2.5 px-5 rounded-md text-sm focus:outline-none focus:ring-4 focus:ring-blue-200 transition duration-150 flex justify-center items-center gap-2">
                <span>Masuk ke Sistem</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h12.5" />
                </svg>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-400">&copy; 2026 Jurusan Teknik Informatika. All rights reserved.</p>
        </div>

    </div>
</body>
</html>
